name: Deploy to Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
          coverage: none

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress
          npm install
          npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Zip files
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" ".env" "node_modules/*" "storage/*.log" "public/storage/*"

      - name: Upload zip file
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" scp -P ${{ secrets.REMOTE_PORT }} -o StrictHostKeyChecking=no deploy.zip ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET }}

      - name: Post Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            set -e
            cd ${{ secrets.TARGET }}
            
            echo "Checking unzip command..."
            if command -v unzip > /dev/null; then
              unzip -o deploy.zip
            else
              echo "Error: unzip command not found on remote server."
              exit 127
            fi
            
            rm deploy.zip
            
            echo "Searching for PHP binaries across the system..."
            # Try to find any php executable in various directories
            FOUND_PHP=$(find /usr/bin /usr/local/bin /usr/share /opt -name "php*" -type f -executable 2>/dev/null | head -n 10 || echo "")
            echo "Found PHP candidates:"
            echo "$FOUND_PHP"

            PHP_CMD=""
            for cmd in $FOUND_PHP /usr/bin/php php; do
              if [ -n "$cmd" ] && $cmd -v > /dev/null 2>&1; then
                PHP_CMD=$cmd
                break
              fi
            done

            if [ -z "$PHP_CMD" ]; then
              echo "Error: PHP command not found in discovered paths."
              echo "This specific Dothome plan might not support PHP CLI via SSH."
              exit 127
            fi
            
            echo "Using PHP command: $PHP_CMD"
            $PHP_CMD artisan migrate --force
            $PHP_CMD artisan optimize
            $PHP_CMD artisan view:clear
            $PHP_CMD artisan config:cache
