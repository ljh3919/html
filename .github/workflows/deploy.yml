name: Deploy to Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
          coverage: none

      - name: Install Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress
          npm install
          npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Zip files
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" ".env" "node_modules/*" "storage/*.log" "public/storage/*"

      - name: Upload zip file
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" scp -P ${{ secrets.REMOTE_PORT }} -o StrictHostKeyChecking=no deploy.zip ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET }}

      - name: Post Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            cd ${{ secrets.TARGET }}
            unzip -o deploy.zip
            rm deploy.zip
            php artisan migrate --force
            php artisan optimize
            php artisan view:clear
            php artisan config:cache
